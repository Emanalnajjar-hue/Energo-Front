<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energo - Access Platform</title>
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

    <div class="main-card">
        <img src="../images/plant.png" alt="Plant" class="plant-overlay">

        <div class="color-side">
            <div class="side-header">
                <span class="icon">🔒</span>
                <h2>Log in to access reliable power solutions</h2>
            </div>
        </div>

        <div class="white-side">
            <div id="login-form" class="form-section">
                <div class="content-area">
                    <h3>Hello dear, welcome! Please sign in to continue ✍️</h3>
                    <form>
                        <div class="input-field">
                            <label for="login-email" style="color: #1a4d3a; font-weight: 600;">Email</label>
                            <input type="text" id="login-email" name="email" autocomplete="email"
                                placeholder="Enter your email">
                        </div>
                        <div class="input-field">
                            <label style="color: #1a4d3a; font-weight: 600;">Password</label>
                            <input type="password" placeholder="••••••••">
                        </div>
                        <button type="button" class="btn-submit">Sign in now</button>
                    </form>
                    <div class="links">
                        <p>Don't have an account? <a href="signup.html">Sign up Here</a></p>
                        <a href="recovery.html" class="forgot">Forgot your password?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../script/script.js"></script>
</body>

</html>
