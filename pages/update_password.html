<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style/update_password-style.css">
</head>

<body>

    <div class="profile-container">
        <div class="sidebar">
            <h2>Update Password</h2>
            <div class="avatar-box">
                <img src="../images/user.jpg" alt="Profile" id="user-avatar">
            </div>
            <h3 id="display-name">User Name</h3>
            <p id="display-email">exampl@email.com</p>
            <div class="user-info-list">
                <p><i class="fa-solid fa-phone"></i> <span id="display-phone">+972 567 917 402</span></p>
                <p><i class="fa-solid fa-location-dot"></i> <span id="display-address">Gaza, Palestine</span></p>
                <p><i class="fa-solid fa-shield-halved"></i> Membership: <strong id="display-membership">---</strong>
                </p>
            </div>
            <div class="rentals-box">
                <i class="fa-solid fa-box-archive" style="font-size: 24px; color: #10482D;"></i>
                <div>
                    <p>Total Rentals</p><strong id="rental-count-display">0 Rentals</strong>
                </div>
            </div>
        </div>

        <div class="main-form">
            <h2>Please enter your new password below</h2>
            <p>Confirm your new password to continue.</p>

            <form id="password-form">
                <div id="error-message" class="error-msg"></div>

                <input type="password" id="current-password" placeholder="Current Password" required>
                <input type="password" id="new-password" placeholder="New Password" required>
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>

                <button type="submit" class="save-btn">Update Password</button>
            </form>
        </div>
    </div>

    <script src="../script/products-script.js">

    </script>
</body>

</html>
