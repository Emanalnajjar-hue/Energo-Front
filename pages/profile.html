<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style/profile-style.css">



</head>

<body>

    <div class="profile-container">
        <aside class="sidebar">
            <h2>Profile Settings</h2>
            <p>Manage your personal information and account preferences.</p>

            <div class="avatar-box">
                <img src="../images/user.jpg" alt="Profile" id="profile-img">
                <button class="edit-avatar" id="change-img-btn">
                    <i class="fa-solid fa-camera"></i>
                </button>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <h3 id="display-name">User Name</h3>
            <p id="display-email">example@email.com</p>

            <div class="status-badge">
                <i class="fa-solid fa-check-circle"></i> Verified User
            </div>

            <div class="user-info-list">
                <p>
                    <i class="fa-solid fa-phone"></i>
                    <span id="display-phone">+972 567 917 402</span>
                </p>
                <p>
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="display-address">Gaza, Palestine</span>
                </p>
                <p>
                    <i class="fa-solid fa-shield-halved"></i>
                    Membership Level: <strong>Silver Member</strong>
                </p>
            </div>

            <div class="rentals-box">
                <i class="fa-solid fa-box-archive"></i>
                <div>
                    <p>Total Rentals</p>
                    <strong id="rental-count-display">8 Rentals</strong>
                </div>
            </div>
        </aside>

        <!-- النموذج الرئيسي -->
        <main class="main-form">
            <h2>Personal Information</h2>
            <form id="profile-form">
                <div class="form-row">
                    <div class="input-field">
                        <label>Full Name</label>
                        <input type="text" id="full-name" placeholder="Enter your full name">
                    </div>
                    <div class="input-field">
                        <label>Email Address</label>
                        <input type="email" id="email-addr" placeholder="Enter your email">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-field">
                        <label>Phone Number</label>
                        <input type="tel" id="phone-num" placeholder="+972 XXX XXX XXXX">
                    </div>
                    <div class="input-field">
                        <label>Date of Birth</label>
                        <input type="date" id="dob">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-field">
                        <label>Address</label>
                        <input type="text" id="address" placeholder="Enter your address">
                    </div>
                    <div class="input-field">
                        <label>City</label>
                        <input type="text" id="city" placeholder="Gaza">
                    </div>
                </div>

                <button type="submit" class="save-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
                <div style="clear: both;"></div>
            </form>
        </main>
    </div>

    <div class="toast" id="toast-msg">Profile updated successfully!</div>

    <script src="../script/profile-scripr.js">
    </script>
</body>

</html>
